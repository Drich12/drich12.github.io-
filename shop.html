<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Tickled Pink Fabric Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
    
        <header>
            <div class="logo-placeholder">Potential Logo</div>
            <h1>Tickled Pink Fabric Shop</h1>
        </header>

      
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                <li><a href="classes.html">Classes</a></li>
                <li><a href="tutorials.html">Tutorials</a></li>
            </ul>
        </nav>

      
        <main>
            <h2>Fabric Shop</h2>


            <div class="photo-grid">
              
                <div class="photo-card product-card">
                    <img src="product-polka-dot.jpg" alt="Pink Polka Dot Cotton fabric sample">
                    <div class="product-info">
                        <p class="product-name">Pink Polka Dot Cotton</p>
                        <p class="product-price">$12.99 / yd</p>
                    </div>
                </div>
                
                <div class="photo-card product-card">
                    <img src="product-floral-linen.jpg" alt="Berry Floral Linen fabric sample">
                    <div class="product-info">
                        <p class="product-name">Berry Floral Linen</p>
                        <p class="product-price">$14.50 / yd</p>
                    </div>
                </div>
                
                <div class="photo-card product-card">
                    <img src="product-rose-flannel.jpg" alt="Soft Rose Flannel fabric sample">
                    <div class="product-info">
                        <p class="product-name">Soft Rose Flannel</p>
                        <p class="product-price">$11.00 / yd</p>
                    </div>
                </div>
              
                <div class="photo-card product-card">
                    <img src="product-magenta-satin.jpg" alt="Magenta Satin Bolt fabric sample">
                    <div class="product-info">
                        <p class="product-name">Magenta Satin Bolt</p>
                        <p class="product-price">$16.00 / yd</p>
                    </div>
                </div>
            </div>
        </main>


        <footer>
            <div class="contact-box">
                <p><a href="mailto:TPFS@help.com">TPFS@help.com</a></p>
                <p class="contact-label">CONTACT US</p>
            </div>
        </footer>
    </div>
</body>
</html>
